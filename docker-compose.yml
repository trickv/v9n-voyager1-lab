version: '2'

services:
  voyager:
    build: .
    image: tcp-mystery-machine:latest
    container_name: voyager
    restart: unless-stopped
    ports:
      - "4242:4242"
    environment:
      VOYAGER_PORT: "4242"
      VOYAGER_MAX_CONN: "200"
      VOYAGER_IDLE_TIMEOUT: "120"
      VOYAGER_MAX_LINE: "256"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
